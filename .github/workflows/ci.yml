name: Portfolio CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: portfolio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type Check, Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://example.com

  docker:
    name: Validate Docker Image
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SITE_URL=https://example.com \
            --tag georges-portfolio:ci \
            .